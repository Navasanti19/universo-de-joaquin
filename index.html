<!DOCTYPE html>
<html lang="es">
<head>

  <!-- Favicon (dino emoji, inline) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦕</text></svg>" />

  <!-- Google Fonts: Fredoka (display) + Nunito (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       VARIABLES / PALETA (tomada de fondo.jpeg)
       ============================================================ */
    :root {
      --bg-deep: #0f1b2d;
      --bg:      #1a2744;

      --gold:  #fbbf24;
      --cyan:  #38bdf8;
      --red:   #ef4444;
      --green: #22c55e;
      --gray:  #94a3b8;
      --purple:#a78bfa;

      --white: #ffffff;
      --soft:  #e8f0fe;
      --muted: #b4c2df;

      --maxw: 1120px;
      --ease: cubic-bezier(.22,.61,.36,1);

      --font-display: "Fredoka", "Nunito", system-ui, sans-serif;
      --font-body: "Nunito", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-body);
      color: var(--soft);
      background: var(--bg-deep);
      line-height: 1.65;
      overflow-x: hidden;
      position: relative;
      min-height: 100%;
      background-image:
        radial-gradient(1200px 700px at 15% -10%, rgba(56,189,248,.14), transparent 60%),
        radial-gradient(1000px 700px at 95% 10%, rgba(167,139,250,.12), transparent 55%),
        radial-gradient(900px 900px at 50% 120%, rgba(251,191,36,.08), transparent 60%),
        linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 45%, var(--bg-deep) 100%);
      background-attachment: fixed;
    }
    img, svg { display: block; max-width: 100%; }
    ::selection { background: var(--gold); color: var(--bg-deep); }

    /* ============================================================
       PRELOADER (cohete despegando)
       ============================================================ */
    #preloader {
      position: fixed; inset: 0; z-index: 200;
      display: grid; place-items: center; gap: 0;
      background:
        radial-gradient(700px 500px at 50% 20%, rgba(56,189,248,.14), transparent 60%),
        var(--bg-deep);
      transition: opacity .6s var(--ease), visibility .6s var(--ease);
    }
    #preloader .pl-inner { text-align: center; }
    #preloader .pl-rocket {
      width: 96px; height: 96px; margin: 0 auto 18px;
      animation: plBob 1.1s ease-in-out infinite;
    }
    #preloader .pl-flame { transform-origin: 50% 0%; animation: plFlame .25s ease-in-out infinite alternate; }
    #preloader .pl-text {
      font-family: var(--font-display); font-weight: 600; color: var(--soft);
      letter-spacing: 2px; text-transform: uppercase; font-size: .9rem;
    }
    #preloader .pl-dots span {
      display: inline-block; width: 7px; height: 7px; margin: 12px 3px 0; border-radius: 50%;
      background: var(--cyan); opacity: .3; animation: plDot 1.2s ease-in-out infinite;
    }
    #preloader .pl-dots span:nth-child(2) { animation-delay: .2s; }
    #preloader .pl-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes plBob   { 0%,100% { transform: translateY(0) rotate(-4deg);} 50% { transform: translateY(-10px) rotate(4deg);} }
    @keyframes plFlame { from { transform: scaleY(.7); opacity:.7;} to { transform: scaleY(1.15); opacity:1;} }
    @keyframes plDot   { 0%,100% { opacity:.25; transform: translateY(0);} 50% { opacity:1; transform: translateY(-5px);} }
    body.loaded #preloader { opacity: 0; visibility: hidden; }

    /* ============================================================
       ESTRELLAS DE FONDO
       ============================================================ */
    #stars, #stars2, #stars3 {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur, 4s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      will-change: opacity, transform;
    }
    @keyframes twinkle {
      0%, 100% { opacity: .15; transform: scale(.7); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
    #stars3 { animation: drift 90s linear infinite; }
    @keyframes drift { from { transform: translateY(0);} to { transform: translateY(-40px);} }
    .sparkle {
      position: absolute; pointer-events: none; color: var(--gold);
      opacity: .85; animation: twinkle 5s ease-in-out infinite; z-index: 0;
    }

    section { position: relative; z-index: 1; }
    .wrap { width: 100%; max-width: var(--maxw); margin-inline: auto; padding-inline: clamp(20px, 5vw, 48px); }
    .accent { color: var(--gold); }

    /* ============================================================
       BOTÓN DE IDIOMA (fijo arriba a la derecha)
       ============================================================ */
    .lang-toggle {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 80;
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font-display); font-weight: 600;
      font-size: .82rem; letter-spacing: .5px;
      color: var(--soft);
      background: rgba(15,27,45,.72);
      border: 1px solid rgba(56,189,248,.4);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      transition: transform .2s var(--ease), background .2s, border-color .2s;
    }
    .lang-toggle:hover { transform: translateY(-2px); background: rgba(34,50,87,.85); border-color: var(--cyan); }
    .lang-toggle:active { transform: scale(.95); }
    .lang-toggle svg { width: 16px; height: 16px; }

    /* ============================================================
       SCROLL REVEAL
       ============================================================ */
    .reveal {
      opacity: 0; transform: translateY(40px);
      transition: opacity .9s var(--ease), transform .9s var(--ease);
      transition-delay: calc(var(--i, 0) * 90ms);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ============================================================
       DINOS FLOTANTES
       ============================================================ */
    .float { animation: float 6s ease-in-out infinite; will-change: transform; }
    .float.d1 { animation-duration: 6.5s; animation-delay: -1s; }
    .float.d2 { animation-duration: 7.5s; animation-delay: -2.5s; }
    .float.d3 { animation-duration: 8s;   animation-delay: -0.5s; }
    .float.d4 { animation-duration: 6.8s; animation-delay: -3.2s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-16px) rotate(-1.5deg); }
    }
    .dino { filter: drop-shadow(0 10px 18px rgba(0,0,0,.35)); }

    /* ============================================================
       HERO
       ============================================================ */
    .hero {
      min-height: 100svh; display: grid; place-items: center; text-align: center;
      padding: 90px 0 60px; overflow: hidden;
    }
    .hero-inner { position: relative; z-index: 2; }
    .hero-dinos { position: relative; height: clamp(170px, 30vw, 260px); margin-bottom: 8px; }
    .hero-dinos > * { position: absolute; height: auto; }
    .hi-sol    { width: clamp(52px, 8vw, 78px); }
    .hi-planet { width: clamp(90px, 14vw, 132px); }
    .hi-dino-l { width: clamp(96px, 16vw, 150px); }
    .hi-dino-r { width: clamp(110px, 18vw, 172px); }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-display); font-weight: 600; letter-spacing: .5px;
      color: var(--cyan); background: rgba(56,189,248,.10);
      border: 1px solid rgba(56,189,248,.35); padding: 6px 16px; border-radius: 999px;
      font-size: clamp(.72rem, 2.6vw, .9rem); margin-bottom: 22px; text-transform: uppercase;
    }
    h1.hero-title {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(2.1rem, 8vw, 4.6rem); line-height: 1.02;
      color: var(--white); letter-spacing: -.5px; text-shadow: 0 6px 30px rgba(0,0,0,.35);
    }
    .hero-sub {
      margin: 22px auto 0; max-width: 640px;
      font-size: clamp(1rem, 3.4vw, 1.3rem); color: var(--soft); font-weight: 600;
    }
    .scroll-cue {
      margin-top: 46px; display: inline-flex; flex-direction: column; align-items: center; gap: 10px;
      color: var(--muted); font-size: .8rem; font-family: var(--font-display);
      letter-spacing: 1px; text-transform: uppercase;
    }
    .scroll-cue .rocket-sep { animation: float 3.5s ease-in-out infinite; }
    .scroll-cue .chevron {
      width: 26px; height: 26px; border-right: 3px solid var(--cyan); border-bottom: 3px solid var(--cyan);
      transform: rotate(45deg); animation: nudge 1.8s ease-in-out infinite; border-radius: 3px;
    }
    @keyframes nudge {
      0%, 100% { transform: rotate(45deg) translate(0,0); opacity: .4; }
      50%      { transform: rotate(45deg) translate(5px,5px); opacity: 1; }
    }

    /* COHETE QUE CRUZA (despegue diagonal abajo-izq -> arriba-der) */
    #rocket-fly {
      position: fixed; left: -170px; bottom: -60px; z-index: 1; pointer-events: none;
      will-change: transform; opacity: 0;
      filter: drop-shadow(0 10px 28px rgba(56,189,248,.4));
      animation: crossScreen 30s linear infinite;
    }
    #rocket-fly img { width: clamp(110px, 16vw, 175px); height: auto; }
    @keyframes crossScreen {
      0%   { transform: translate(0, 0) rotate(-8deg) scale(.85); opacity: 0; }
      10%  { opacity: 1; }
      88%  { opacity: 1; }
      100% { transform: translate(112vw, -108vh) rotate(-8deg) scale(1.05); opacity: 0; }
    }

    /* EASTER EGG: dinos interactivos + lluvia de estrellas */
    .dino { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .dino.tapped { animation: dinoWiggle .5s var(--ease); }
    @keyframes dinoWiggle {
      0%,100% { transform: rotate(0) scale(1); }
      25% { transform: rotate(-8deg) scale(1.08); }
      60% { transform: rotate(7deg) scale(1.08); }
    }
    /* estrella fugaz: cabeza brillante + cola */
    .shooting-star {
      position: fixed; z-index: 95; width: 7px; height: 7px; border-radius: 50%;
      background: var(--c, #fff); box-shadow: 0 0 10px 2px var(--c, #fff);
      pointer-events: none; will-change: transform, opacity;
    }
    .shooting-star::before {
      content: ""; position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
      width: 110px; height: 2px; border-radius: 2px;
      background: linear-gradient(270deg, var(--c, #fff), transparent);
    }
    .egg-toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.6);
      z-index: 120; font-family: var(--font-display); font-weight: 700;
      font-size: clamp(2rem, 10vw, 5rem); color: var(--gold); text-shadow: 0 8px 30px rgba(0,0,0,.5);
      opacity: 0; pointer-events: none; transition: opacity .3s, transform .4s var(--ease); text-align:center;
    }
    .egg-toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

    /* ============================================================
       CARTA
       ============================================================ */
    .letter { padding: clamp(60px, 12vw, 120px) 0; }
    .section-head { text-align: center; margin-bottom: clamp(30px, 6vw, 56px); }
    .kicker {
      font-family: var(--font-display); color: var(--cyan); font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; font-size: .82rem; margin-bottom: 10px;
    }
    h2 {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(1.8rem, 6vw, 3.1rem); color: var(--white); line-height: 1.08;
    }
    .letter-card {
      position: relative; max-width: 760px; margin-inline: auto;
      background: linear-gradient(160deg, rgba(34,50,87,.75), rgba(15,27,45,.75));
      border: 1px solid rgba(56,189,248,.20); border-radius: 28px;
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 30px 70px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter: blur(6px);
    }
    .letter-card p { font-size: clamp(1rem, 2.8vw, 1.18rem); margin-bottom: 1.2em; }
    .letter-card p:last-child { margin-bottom: 0; }
    .letter-sign {
      margin-top: 1.6em !important; font-family: var(--font-display);
      font-size: clamp(1.1rem, 3.2vw, 1.5rem) !important; color: var(--gold); font-weight: 600;
    }
    .letter-deco { position: absolute; z-index: 0; height: auto; }
    .letter-deco.left  { left: -90px;  top: 20px;  width: clamp(110px, 13vw, 158px); }
    .letter-deco.right { right: -78px; bottom: 10px; width: clamp(90px, 11vw, 128px); }
    @media (max-width: 900px) { .letter-deco { display: none; } }
    /* dinos decorativos sueltos por secciones */
    .deco-dino { position: absolute; z-index: 0; opacity: .92; }
    @media (max-width: 900px) { .deco-dino { display: none; } }
    /* fila de dinos del footer */
    .foot-dinos { display: flex; justify-content: center; align-items: flex-end; gap: 8px; margin-bottom: 18px; }
    .foot-dinos .dino { width: 78px; }
    .foot-dinos .dino:nth-child(2) { width: 96px; }

    /* ============================================================
       SUEÑOS
       ============================================================ */
    .dreams { padding: clamp(50px, 10vw, 100px) 0; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(16px, 3vw, 26px); margin-top: 10px; }
    .card {
      position: relative;
      background: linear-gradient(160deg, rgba(34,50,87,.85), rgba(20,30,54,.9));
      border: 1px solid rgba(255,255,255,.08); border-radius: 24px;
      padding: clamp(22px, 4vw, 34px) clamp(18px, 3vw, 28px); text-align: center;
      transition: transform .35s var(--ease), box-shadow .35s var(--ease), border-color .35s var(--ease);
      overflow: hidden; isolation: isolate;
    }
    .card::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(120px 120px at 50% 0%, var(--glow, var(--cyan)), transparent 70%);
      opacity: 0; transition: opacity .35s var(--ease); z-index: -1;
    }
    .card:hover, .card:focus-within {
      transform: translateY(-10px) scale(1.03);
      border-color: color-mix(in srgb, var(--glow, var(--cyan)) 60%, transparent);
      box-shadow: 0 24px 50px rgba(0,0,0,.4), 0 0 42px color-mix(in srgb, var(--glow) 45%, transparent);
    }
    .card:hover::before, .card:focus-within::before { opacity: .28; }
    .card-icon {
      width: clamp(62px, 14vw, 82px); height: clamp(62px, 14vw, 82px); margin: 0 auto 16px;
      display: grid; place-items: center; background: rgba(255,255,255,.06); border-radius: 20px;
    }
    .card-icon svg { width: 68%; height: 68%; }
    .card h3 { font-family: var(--font-display); font-weight: 600; font-size: clamp(1.15rem, 3.4vw, 1.4rem); color: var(--white); }
    .card p { font-size: clamp(.88rem, 2.6vw, .98rem); color: var(--muted); margin-top: 10px; }

    /* ============================================================
       APOYA SUS SUEÑOS
       ============================================================ */
    .support { padding: clamp(50px, 10vw, 100px) 0 clamp(60px, 10vw, 110px); }
    .support-inner { max-width: 640px; margin-inline: auto; text-align: center; }
    .support-inner > p.lead { margin: 18px auto 0; font-size: clamp(1rem, 3vw, 1.15rem); color: var(--soft); max-width: 520px; }
    .support-inner .sub { display:block; color: var(--gold); font-family: var(--font-display); font-weight: 600; margin-top: 10px; letter-spacing: .5px; }

    .tag-card {
      margin: clamp(28px, 6vw, 40px) auto 0; max-width: 460px;
      background: linear-gradient(140deg, #1e2c4d, #12203a);
      border: 1px solid rgba(56,189,248,.35); border-radius: 22px; padding: 26px 24px;
      box-shadow: 0 26px 60px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
      position: relative; overflow: hidden; text-align: left;
    }
    .tag-card::after {
      content: ""; position: absolute; top: -50%; left: -20%; width: 60%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent); transform: rotate(18deg);
    }
    .tag-card .tag-label { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 1.5px; font-size: .72rem; color: var(--cyan); margin-bottom: 6px; }
    .tag-card .tag-value {
      font-family: var(--font-display); font-weight: 700; font-size: clamp(1.3rem, 5vw, 1.7rem);
      color: var(--white); word-break: break-word; display: flex; align-items: center; gap: 10px;
    }
    .tag-card .tag-hint { font-size: .8rem; color: var(--muted); margin-top: 8px; }
    .copy-btn {
      margin-left: auto; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      color: var(--soft); font-family: var(--font-body); font-weight: 700; font-size: .74rem;
      padding: 6px 12px; border-radius: 999px; cursor: pointer; transition: background .25s, transform .15s; white-space: nowrap;
    }
    .copy-btn:hover { background: rgba(255,255,255,.16); }
    .copy-btn:active { transform: scale(.94); }

    .cta-btn {
      position: relative; margin: clamp(26px,5vw,34px) auto 0;
      display: inline-flex; align-items: center; gap: 12px;
      font-family: var(--font-display); font-weight: 700; font-size: clamp(1.05rem, 3.4vw, 1.35rem);
      color: var(--bg-deep); background: linear-gradient(135deg, var(--gold), #f59e0b);
      border: none; border-radius: 999px; padding: 16px 38px; cursor: pointer;
      box-shadow: 0 16px 40px rgba(251,191,36,.35), inset 0 1px 0 rgba(255,255,255,.5);
      transition: transform .25s var(--ease), box-shadow .25s var(--ease); overflow: visible;
    }
    .cta-btn:hover { transform: translateY(-4px) scale(1.04); box-shadow: 0 22px 54px rgba(251,191,36,.5); }
    .cta-btn:active { transform: translateY(-1px) scale(1); }
    .cta-note { margin-top: 14px; font-size: .8rem; color: var(--muted); }
    .confetti-piece { position: fixed; z-index: 60; pointer-events: none; will-change: transform, opacity; }

    /* TOAST */
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 20px);
      z-index: 90; max-width: 88vw;
      background: rgba(15,27,45,.95); color: var(--soft);
      border: 1px solid rgba(56,189,248,.4); border-radius: 16px;
      padding: 14px 20px; font-weight: 700; font-size: .92rem; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,.5); backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none; transition: opacity .3s var(--ease), transform .3s var(--ease);
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast small { display: block; font-weight: 600; color: var(--muted); margin-top: 3px; font-size: .82rem; }

    /* ============================================================
       FOOTER
       ============================================================ */
    footer { position: relative; z-index: 1; text-align: center; padding: clamp(48px, 9vw, 80px) 0 40px; border-top: 1px solid rgba(255,255,255,.08); }
    footer .love { font-family: var(--font-display); font-weight: 600; font-size: clamp(1.1rem, 4vw, 1.6rem); color: var(--white); }
    footer .credit { margin-top: 18px; color: var(--soft); font-weight: 700; }
    footer .year { margin-top: 20px; font-family: var(--font-display); color: var(--gold); letter-spacing: 4px; font-weight: 600; }
    footer .foot-dino { margin: 0 auto 22px; width: 92px; animation: float 5s ease-in-out infinite; }

    /* RESPONSIVE */
    @media (max-width: 768px) { .cards { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 420px) { .cards { grid-template-columns: 1fr; } }

    /* REDUCIR MOVIMIENTO */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important; animation-iteration-count: 1 !important;
        transition-duration: .001ms !important; scroll-behavior: auto !important;
      }
      .reveal { opacity: 1; transform: none; }
      #rocket-fly { display: none; }
    }
  </style>
</head>

<body>
  <!-- PRELOADER (cohete despegando) -->
  <div id="preloader" aria-hidden="true">
    <div class="pl-inner">
      <svg class="pl-rocket" viewBox="0 0 60 78" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="pl-flame">
          <path d="M22 56 q8 20 16 0 q-8 12 -16 0 Z" fill="#fbbf24"/>

  <script>
    /* ============================================================
       i18n — detecta idioma del navegador, alterna con el botón
       ============================================================ */
    const I18N = (function () {
      const saved = localStorage.getItem('joaquin-lang');
      const browser = (navigator.language || 'es').toLowerCase().startsWith('es') ? 'es' : 'en';
      let lang = saved || browser;

      const strings = {
        es: { toggle: 'EN', toastTitle: '¡Cuenta copiada! ✓', toastSub: 'Pégala en tu app de banco para transferir 💫', copyErr: 'Copia manual: ' },
        en: { toggle: 'ES', toastTitle: 'Account copied! ✓', toastSub: 'Paste it in your banking app to send the gift 💫', copyErr: 'Copy manually: ' },
      };

      function apply() {
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-es]').forEach(el => {
          const val = el.getAttribute('data-' + lang);
          if (val != null) el.innerHTML = val;
        });
        document.getElementById('langLabel').textContent = strings[lang].toggle;
        // botón CTA usa span interno (el data-es está en el <button>, ok con innerHTML arriba,
        // pero re-inyectamos el icono): simplificamos poniendo texto en #ctaLabel
      }

      // El botón CTA tiene icono + texto; para no perder el icono al setear innerHTML,
      // movemos su traducción al span #ctaLabel manualmente.
      function fixCta() {
        const btn = document.getElementById('ctaBtn');
        const label = document.getElementById('ctaLabel');
        label.textContent = btn.getAttribute('data-' + lang);
      }

      return {
        get lang() { return lang; },
        t(k) { return strings[lang][k]; },
        apply() {
          // proteger el CTA: quitamos data-es/en temporalmente para que el bucle no lo pise
          const btn = document.getElementById('ctaBtn');
          const es = btn.getAttribute('data-es'), en = btn.getAttribute('data-en');
          btn.removeAttribute('data-es'); btn.removeAttribute('data-en');
          apply();
          btn.setAttribute('data-es', es); btn.setAttribute('data-en', en);
          fixCta();
        },
        toggle() {
          lang = lang === 'es' ? 'en' : 'es';
          localStorage.setItem('joaquin-lang', lang);
          this.apply();
        },
      };
    })();

    I18N.apply();
    document.getElementById('langToggle').addEventListener('click', () => I18N.toggle());

    /* ============================================================
       ESTRELLAS DE FONDO
       ============================================================ */
    (function makeStars() {
      const layers = [
        { el: document.getElementById('stars'),  count: 60, min: 1, max: 2 },
        { el: document.getElementById('stars2'), count: 40, min: 1.5, max: 3 },
        { el: document.getElementById('stars3'), count: 30, min: 2, max: 3.5 },
      ];
      layers.forEach(({ el, count, min, max }) => {
        const f = document.createDocumentFragment();
        for (let i = 0; i < count; i++) {
          const s = document.createElement('span');
          s.className = 'star';
          const size = (Math.random() * (max - min) + min).toFixed(1);
          s.style.width = size + 'px'; s.style.height = size + 'px';
          s.style.left = (Math.random() * 100).toFixed(2) + '%';
          s.style.top = (Math.random() * 100).toFixed(2) + '%';
          s.style.setProperty('--dur', (Math.random() * 4 + 2.5).toFixed(1) + 's');
          s.style.setProperty('--delay', (Math.random() * -6).toFixed(1) + 's');
          f.appendChild(s);
        }
        el.appendChild(f);
      });
      const spread = document.getElementById('stars2');
      [[12,18],[80,12],[68,70],[24,64],[90,44],[46,30],[8,80],[58,88]].forEach(([x, y], idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'sparkle';
        wrap.style.left = x + '%'; wrap.style.top = y + '%';
        wrap.style.setProperty('--delay', (idx * -0.7) + 's');
        wrap.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 0 C9 6 10 7 16 8 C10 9 9 10 8 16 C7 10 6 9 0 8 C6 7 7 6 8 0 Z" fill="currentColor"/></svg>';
        spread.appendChild(wrap);
      });
    })();

    /* ============================================================
       SCROLL REVEAL
       ============================================================ */
    (function reveals() {
      const els = document.querySelectorAll('.reveal');
      if (!('IntersectionObserver' in window)) { els.forEach(e => e.classList.add('visible')); return; }
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) { entry.target.classList.add('visible'); io.unobserve(entry.target); }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });
      els.forEach(e => io.observe(e));
    })();

    /* ============================================================
       PARALAJE
       ============================================================ */
    (function parallax() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const l2 = document.getElementById('stars2'), l3 = document.getElementById('stars3');
      let ticking = false;
      window.addEventListener('scroll', () => {
        if (ticking) return; ticking = true;
        requestAnimationFrame(() => {
          const y = window.scrollY;
          l2.style.transform = 'translateY(' + (y * 0.06) + 'px)';
          l3.style.transform = 'translateY(' + (y * -0.10) + 'px)';
          ticking = false;
        });
      }, { passive: true });
    })();

    /* ============================================================
       COPIAR + TOAST + CTA
       ============================================================ */
    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); return true; }
      catch (e) {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        let ok = false; try { ok = document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta); return ok;
      }
    }

    let toastTimer;
    function showToast(title, sub) {
      const t = document.getElementById('toast');
      t.innerHTML = title + (sub ? '<small>' + sub + '</small>' : '');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
    }

    (function copyTagBtn() {
      const btn = document.getElementById('copyTag');
      const tag = document.getElementById('transfer-tag');
      btn.addEventListener('click', async () => {
        const ok = await copyText(tag.textContent.trim());
        if (ok) showToast(I18N.t('toastTitle'), I18N.t('toastSub'));
        else showToast(I18N.t('copyErr') + tag.textContent.trim(), '');
      });
    })();

    (function ctaButton() {
      const btn = document.getElementById('ctaBtn');
      const tag = document.getElementById('transfer-tag');
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const colors = ['#fbbf24', '#38bdf8', '#ef4444', '#22c55e', '#a78bfa', '#ffffff'];
      let cooling = false;

      function burst() {
        if (reduce) return;
        const rect = btn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2, N = 20;
        for (let i = 0; i < N; i++) {
          const p = document.createElement('div');
          p.className = 'confetti-piece';
          const color = colors[(Math.random() * colors.length) | 0];
          if (Math.random() > 0.5) {
            p.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 0 C9 6 10 7 16 8 C10 9 9 10 8 16 C7 10 6 9 0 8 C6 7 7 6 8 0 Z" fill="' + color + '"/></svg>';
          } else {
            p.style.width = '9px'; p.style.height = '9px'; p.style.background = color; p.style.borderRadius = '2px';
          }
          p.style.left = cx + 'px'; p.style.top = cy + 'px';
          document.body.appendChild(p);
          const angle = (Math.PI * 2 * i) / N + Math.random() * 0.5;
          const dist = 60 + Math.random() * 90;
          const dx = Math.cos(angle) * dist, dy = Math.sin(angle) * dist - 40;
          const rot = (Math.random() * 720 - 360);
          p.animate([
            { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
            { transform: 'translate(' + dx + 'px,' + (dy + 120) + 'px) rotate(' + rot + 'deg)', opacity: 0 }
          ], { duration: 900 + Math.random() * 500, easing: 'cubic-bezier(.2,.7,.3,1)' }).onfinish = () => p.remove();
        }
      }

      // click => copiar cuenta + confetti + toast (acción real)
      btn.addEventListener('click', async () => {
        burst();
        const ok = await copyText(tag.textContent.trim());
        if (ok) showToast(I18N.t('toastTitle'), I18N.t('toastSub'));
        else showToast(I18N.t('copyErr') + tag.textContent.trim(), '');
      });
      // hover => solo confetti (con enfriamiento)
      btn.addEventListener('mouseenter', () => {
        if (cooling) return; cooling = true; burst();
        setTimeout(() => cooling = false, 700);
      });
    })();

    /* ============================================================
       PRELOADER — ocultar al cargar
       ============================================================ */
    (function preloader() {
      function hide() { document.body.classList.add('loaded'); }
      if (document.readyState === 'complete') { setTimeout(hide, 350); }
      else { window.addEventListener('load', () => setTimeout(hide, 350)); }
      // fallback por si 'load' tarda (fuentes/imagenes lentas)
      setTimeout(hide, 4000);
    })();

    /* ============================================================
       EASTER EGG — 5 toques a un dino => estrellas fugaces + rugido
       ============================================================ */
    (function easterEgg() {
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const dinos = document.querySelectorAll('.dino[data-egg]');
      const eggToast = document.getElementById('eggToast');
      const colors = ['#fbbf24', '#38bdf8', '#ef4444', '#22c55e', '#a78bfa', '#ffffff'];
      let taps = 0, tapTimer;

      function starAt(x, y) {
        if (reduce) return;
        for (let i = 0; i < 8; i++) {
          const p = document.createElement('div');
          p.className = 'confetti-piece';
          const c = colors[(Math.random() * colors.length) | 0];
          p.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16"><path d="M8 0 C9 6 10 7 16 8 C10 9 9 10 8 16 C7 10 6 9 0 8 C6 7 7 6 8 0 Z" fill="' + c + '"/></svg>';
          p.style.left = x + 'px'; p.style.top = y + 'px';
          document.body.appendChild(p);
          const a = Math.random() * Math.PI * 2, d = 30 + Math.random() * 50;
          p.animate([
            { transform: 'translate(0,0) scale(1)', opacity: 1 },
            { transform: 'translate(' + Math.cos(a) * d + 'px,' + Math.sin(a) * d + 'px) scale(0)', opacity: 0 }
          ], { duration: 700, easing: 'ease-out' }).onfinish = () => p.remove();
        }
      }

      function roar() {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          const ctx = new AC();
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(180, ctx.currentTime);
          o.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.5);
          g.gain.setValueAtTime(0.0001, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.05);
          g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.7);
          o.connect(g); g.connect(ctx.destination);
          o.start(); o.stop(ctx.currentTime + 0.75);
          o.onended = () => ctx.close();
        } catch (e) {}
      }

      // estrellas fugaces cruzando desde la izquierda hacia arriba-derecha
      function shootingStars() {
        if (reduce) { celebrate(); return; }
        const N = 11;
        for (let i = 0; i < N; i++) {
          const s = document.createElement('div');
          s.className = 'shooting-star';
          const c = colors[(Math.random() * colors.length) | 0];
          s.style.setProperty('--c', c);
          s.style.top = (Math.random() * 62 + 6).toFixed(1) + 'vh';
          s.style.left = '-12vw';
          document.body.appendChild(s);
          const dx = (112 + Math.random() * 22);      // vw hacia la derecha
          const dy = -(8 + Math.random() * 20);       // vh sube un poco
          const rot = -(9 + Math.random() * 9);       // grados (cola alineada)
          s.animate([
            { transform: 'translate(0,0) rotate(' + rot + 'deg) scale(.5)', opacity: 0 },
            { opacity: 1, offset: 0.12 },
            { opacity: 1, offset: 0.82 },
            { transform: 'translate(' + dx + 'vw,' + dy + 'vh) rotate(' + rot + 'deg) scale(1)', opacity: 0 }
          ], { duration: 850 + Math.random() * 500, delay: i * 130 + Math.random() * 90, easing: 'cubic-bezier(.35,.5,.5,1)' })
            .onfinish = () => s.remove();
        }
        celebrate();
      }

      function celebrate() {
        roar();
        eggToast.classList.add('show');
        setTimeout(() => eggToast.classList.remove('show'), 1600);
      }

      dinos.forEach(el => {
        el.addEventListener('click', (e) => {
          el.classList.remove('tapped'); void el.offsetWidth; el.classList.add('tapped');
          const r = el.getBoundingClientRect();
          starAt(r.left + r.width / 2, r.top + r.height / 2);
          taps++;
          clearTimeout(tapTimer);
          tapTimer = setTimeout(() => { taps = 0; }, 2500); // hay que ser agil
          if (taps >= 5) { taps = 0; shootingStars(); }
        });
      });
    })();
  </script>
</body>
